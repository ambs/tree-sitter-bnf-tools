name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - run: npm install -g tree-sitter-cli@0.26.9
      - run: make fmt-check
      - run: make lint
      - run: make test
      - run: cargo package -p tree-sitter-bnf --no-verify --allow-dirty
      # ts-bnf-tool packaging requires tree-sitter-bnf to be on crates.io first;
      # add `cargo package -p ts-bnf-tool --no-verify --allow-dirty` here after first publish.

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ubuntu-latest-cargo-llvm-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-latest-cargo-llvm-cov-
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - run: npm install -g tree-sitter-cli@0.26.9
      - run: make generate
      - uses: taiki-e/install-action@6ed6112eb9893c58dd600eebccdf6e77ab7bfa9c # v2
        with:
          tool: cargo-llvm-cov
      - name: Run tests with coverage
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info
          cargo llvm-cov report --json --summary-only > coverage.json
      - name: Build markdown coverage table
        run: |
          python3 - <<'EOF'
          import json, os

          with open('coverage.json') as f:
              data = json.load(f)

          workspace = os.environ.get('GITHUB_WORKSPACE', '').rstrip('/') + '/'
          files = data['data'][0]['files']
          totals = data['data'][0]['totals']

          def fmt(s, key):
              return f"{s[key]['covered']}/{s[key]['count']} ({s[key]['percent']:.1f}%)"

          t = totals
          title = (
              f"## Test coverage — "
              f"{t['lines']['percent']:.1f}% lines · "
              f"{t['functions']['percent']:.1f}% functions · "
              f"{t['regions']['percent']:.1f}% regions"
          )

          rows = []
          rows.append('| File | Lines | Functions | Regions |')
          rows.append('|:-----|------:|----------:|--------:|')
          for file in files:
              name = file['filename'].removeprefix(workspace)
              s = file['summary']
              rows.append(f'| `{name}` | {fmt(s, "lines")} | {fmt(s, "functions")} | {fmt(s, "regions")} |')
          rows.append(f'| **Total** | **{fmt(t, "lines")}** | **{fmt(t, "functions")}** | **{fmt(t, "regions")}** |')

          output = title + '\n\n' + '\n'.join(rows) + '\n'
          with open('coverage-table.md', 'w') as f:
              f.write(output)
          print(output)
          EOF
      - name: Write step summary
        run: cat coverage-table.md >> $GITHUB_STEP_SUMMARY
      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: coverage
          path: coverage-table.md
      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        if: github.actor != 'dependabot[bot]'
        with:
          files: lcov.info
          disable_search: true
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
