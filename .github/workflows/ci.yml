name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Cache tree-sitter-cli
        id: cache-ts-cli
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/bin/tree-sitter
          key: ${{ runner.os }}-tree-sitter-cli-0.26.9
      - name: Install tree-sitter-cli
        if: steps.cache-ts-cli.outputs.cache-hit != 'true'
        run: cargo install tree-sitter-cli --version 0.26.9 --locked
      - uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2.82.6
        with:
          tool: cargo-audit
      - run: make fmt-check
      - run: make lint
      - run: make test
      - run: make audit
      - run: cargo package -p tree-sitter-bnf --no-verify --allow-dirty
      # ts-bnf-tool packaging requires tree-sitter-bnf to be on crates.io first;
      # add `cargo package -p ts-bnf-tool --no-verify --allow-dirty` here after first publish.

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ubuntu-latest-cargo-llvm-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-latest-cargo-llvm-cov-
      - name: Cache tree-sitter-cli
        id: cache-ts-cli
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/bin/tree-sitter
          key: ${{ runner.os }}-tree-sitter-cli-0.26.9
      - name: Install tree-sitter-cli
        if: steps.cache-ts-cli.outputs.cache-hit != 'true'
        run: cargo install tree-sitter-cli --version 0.26.9 --locked
      # graphviz provides `dot`, needed by the graph subcommand's rendering
      # tests (they skip when it is missing, which would lose coverage).
      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz
      - run: make generate
      - uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2.82.6
        with:
          tool: cargo-llvm-cov
      - name: Run tests with coverage
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info
          cargo llvm-cov report --json --summary-only > coverage.json
      - name: Build markdown coverage table
        run: |
          python3 - <<'EOF'
          import json, os

          with open('coverage.json') as f:
              data = json.load(f)

          workspace = os.environ.get('GITHUB_WORKSPACE', '').rstrip('/') + '/'
          files = data['data'][0]['files']
          totals = data['data'][0]['totals']

          def fmt(s, key):
              return f"{s[key]['covered']}/{s[key]['count']} ({s[key]['percent']:.1f}%)"

          t = totals
          title = (
              f"## Test coverage — "
              f"{t['lines']['percent']:.1f}% lines · "
              f"{t['functions']['percent']:.1f}% functions · "
              f"{t['regions']['percent']:.1f}% regions"
          )

          rows = []
          rows.append('| File | Lines | Functions | Regions |')
          rows.append('|:-----|------:|----------:|--------:|')
          for file in files:
              name = file['filename'].removeprefix(workspace)
              s = file['summary']
              rows.append(f'| `{name}` | {fmt(s, "lines")} | {fmt(s, "functions")} | {fmt(s, "regions")} |')
          rows.append(f'| **Total** | **{fmt(t, "lines")}** | **{fmt(t, "functions")}** | **{fmt(t, "regions")}** |')

          output = title + '\n\n' + '\n'.join(rows) + '\n'
          with open('coverage-table.md', 'w') as f:
              f.write(output)
          print(output)
          EOF
      - name: Write step summary
        run: cat coverage-table.md >> $GITHUB_STEP_SUMMARY
      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: coverage
          path: coverage-table.md
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: lcov.info
          disable_search: true
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
