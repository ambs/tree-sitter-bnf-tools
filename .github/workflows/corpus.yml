name: Corpus tests

on:
  push:
    paths:
      - 'tree-sitter-bnf/grammar.js'
      - 'tree-sitter-bnf/test/**'
  pull_request:
    paths:
      - 'tree-sitter-bnf/grammar.js'
      - 'tree-sitter-bnf/test/**'

jobs:
  corpus:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install -g tree-sitter-cli
      - run: make test-grammar
