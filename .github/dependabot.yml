version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 14

  - package-ecosystem: npm
    directory: "/tree-sitter-bnf"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 14

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 14
