[package]
name = "ts-bnf-tool"
version = "0.1.0"
edition = "2021"
description = "CLI tool for converting BNF grammars to tree-sitter notation"
license = "MIT"

[[bin]]
name = "ts-bnf-tool"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
tree-sitter-bnf = { path = "../tree-sitter-bnf" }
tree-sitter = "0.26.8"
clap = { version = "4", features = ["derive"] }
