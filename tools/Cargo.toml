[package]
name = "bnf-tools"
version = "0.1.0"
edition = "2021"
description = "CLI tools for working with BNF grammars"
license = "MIT"

[[bin]]
name = "bnf-tools"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
tree-sitter-bnf = { path = "../tree-sitter-bnf" }
tree-sitter = "0.26.8"
clap = { version = "4", features = ["derive"] }
